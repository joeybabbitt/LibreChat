version: 1.2.8
cache: true

interface:
  title: "Wolfe's LibreChat"
  endpointsMenu: true
  artifacts:
    enabled: true
    maxSize: 10000000
  privacyPolicy:
    externalUrl: "https://librechat.ai/privacy-policy"
    openNewTab: true
  termsOfService:
    externalUrl: "https://librechat.ai/tos"
    openNewTab: true

registration:
  socialLogins: ["google", "github", "discord"]

rateLimits:
  fileUploads:
    ipMax: 100
    ipWindowInMinutes: 60
    userMax: 50
    userWindowInMinutes: 60
  conversationRateLimit:
    enabled: true
    max: 120
    windowInMinutes: 60

fileConfig:
  serverFileSizeLimit: 100
  avatarSizeLimit: 2
  endpoints:
    OpenRouter:
      disabled: false
      fileLimit: 10
      fileSizeLimit: 20
      totalSizeLimit: 50
      supportedMimeTypes:
        - "image/*"
        - "application/pdf"
        - "text/*"
    default:
      disabled: false
      fileLimit: 5
      fileSizeLimit: 10
      totalSizeLimit: 25
      supportedMimeTypes:
        - "image/*"
        - "application/pdf"
        - "text/*"

mcpServers:
  Time:
    type: "stdio"
    command: "uvx"
    args: ["mcp-server-time"]
    startup: false
  GitHub:
    type: "stdio"
    command: "uvx"
    args: ["mcp-server-github"]
    env:
      GITHUB_TOKEN: "${GITHUB_TOKEN}"
    startup: false

# ===================================================
# ENDPOINTS SECTION
# ===================================================
endpoints:
  # 1. Native Anthropic (List)
  anthropic:
    apiKey: "${ANTHROPIC_API_KEY}"
    promptCaching: true
    models:
      - "claude-3-5-sonnet-latest"
      - "claude-3-5-haiku-latest"
    titleModel: "claude-3-5-haiku-latest"

  # 2. Native Google (List)
  google:
    apiKey: "${GOOGLE_KEY}"
    models:
      - "gemini-2.0-flash-exp"
      - "gemini-2.0-flash-thinking-exp-1219"
      - "gemini-1.5-pro-latest"
      - "gemini-1.5-flash-latest"
    titleModel: "gemini-1.5-flash-latest"

  # 3. Native OpenAI (List)
  openAI:
    apiKey: "${OPENAI_API_KEY}"
    models:
      - "gpt-4o"
      - "gpt-4o-mini"
      - "o1-mini"
      - "o1-preview"
    titleModel: "gpt-4o-mini"

  # 4. OpenRouter (Object)
  custom:
    - name: "OpenRouter"
      apiKey: "${OPENROUTER_KEY}"
      baseURL: "https://openrouter.ai/api/v1"
      models:
        default:
          - "anthropic/claude-sonnet-4.5"
          - "anthropic/claude-opus-4"
          - "openai/gpt-4o"
          - "deepseek-ai/deepseek-r1"
          - "google/gemini-3-flash-preview"
          - "meta-llama/llama-3.3-70b-instruct"
        fetch: false
      titleConvo: true
      titleModel: "anthropic/claude-sonnet-4.5"
      dropParams: ["stop"]
      modelDisplayLabel: "OpenRouter"
      forcePrompt: false

# ===================================================
# MODEL SPECS
# ===================================================
modelSpecs:
  list:
    - name: "coding-assistant"
      label: "💻 Coding Assistant"
      preset:
        e
