# librechat_production.yaml
# v1.3.6 — merged upstream + custom Railway config

version: "1.3.6"
cache: true

# --- INTERFACE ---
interface:
  # New in 1.3.6
  fileSearch: true
  endpointsMenu: true
  modelSelect: true
  parameters: true
  sidePanel: true
  presets: true
  bookmarks: true
  multiConvo: true
  fileCitations: true
  peoplePicker:
    users: true
    groups: true
    roles: true
  agents:
    use: true
    create: true
    share: false
    public: false
  prompts:
    use: true
    create: true
    share: false
    public: false
  marketplace:
    use: false
  # MCP server permissions — uncomment to enable
  # mcpServers:
  #   use: true
  #   create: false
  #   share: false
  #   public: false

# --- SECURITY ---
actions:
  allowedDomains:
    - "api.tavily.com"
    - "api.fireworks.ai"
    - "openrouter.ai"
    - "api.deepseek.com"          # added for DeepSeek direct endpoint

# MCP transport domain allowlist — uncomment if adding remote MCP servers
# mcpSettings:
#   allowedDomains:
#     - "host.docker.internal"

# --- REGISTRATION ---
registration:
  socialLogins: ["discord", "github", "google"]
  # Note: ALLOW_REGISTRATION=false goes in Railway env vars, not here

# --- WEB SEARCH ---
webSearch:
  searchProvider: "serper"
  serperApiKey: "${SERPER_API_KEY}"
  scraperProvider: "serper"
  rerankerType: "jina"
  jinaApiKey: "${JINA_API_KEY}"
  scraperTimeout: 30000    # bumped from default 7500ms — Serper scraper can be slow on heavy pages
  safeSearch: 0            # 0 = OFF, 1 = MODERATE (default), 2 = STRICT

# --- MODEL SPECS ---
modelSpecs:
  enforce: false
  prioritize: true
  list:
    - name: "sonnet-4.5-agent"
      label: "Claude 4.5 Sonnet (Agentic Workhorse)"
      endpoint: "OpenRouter"
      model: "anthropic/claude-sonnet-4.5"
      preset:
        endpoint: "OpenRouter"
        model: "anthropic/claude-sonnet-4.5"
        tools: ["tavily_search"]
    - name: "gemini-3-flash-agent"
      label: "Gemini 3 Flash (1M Token Agent)"
      endpoint: "OpenRouter"
      model: "google/gemini-3-flash-preview"
      preset:
        endpoint: "OpenRouter"
        model: "google/gemini-3-flash-preview"
        tools: ["tavily_search"]
    - name: "kimi-k2.5-fast"
      label: "Kimi K2.5 (High-Speed Agent)"
      endpoint: "Fireworks"
      model: "accounts/fireworks/models/kimi-k2p5"
      preset:
        endpoint: "Fireworks"
        model: "accounts/fireworks/models/kimi-k2p5"
        tools: ["tavily_search"]

# --- FILE CONFIG ---
fileConfig:
  endpoints:
    default:
      fileSizeLimit: 25
      supportedMimeTypes:
        - "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
        - "application/pdf"
        - "text/.*"

# --- ENDPOINTS ---
endpoints:
  custom:
    - name: "Fireworks"
      apiKey: "${FIREWORKS_API_KEY}"
      baseURL: "https://api.fireworks.ai/inference/v1"
      models:
        fetch: false
        default:
          # --- Kimi (Moonshot) ---
          - "accounts/fireworks/models/kimi-k2p6"           # NEW — Kimi K2.6, 1.1T MoE, Tier A coding, 256K ctx
          - "accounts/fireworks/models/kimi-k2p5"           # Kimi K2.5, still solid & cheaper
          # --- DeepSeek ---
          - "accounts/fireworks/models/deepseek-v4-pro"     # NEW — 1.6T MoE, 1M ctx, live 2026-04-27
          # NOTE: deepseek-v4-flash not yet confirmed on Fireworks (only V4 Pro banner live);
          # uncomment once you verify it's available at fireworks.ai/models:
          # - "accounts/fireworks/models/deepseek-v4-flash"
          - "accounts/fireworks/models/deepseek-v3p2"       # keep as fallback (cheaper, stable)
          # --- Qwen ---
          - "accounts/fireworks/models/qwen3p6-plus"        # NEW — 396B MoE, exclusive to Fireworks outside Alibaba
          - "accounts/fireworks/models/qwen2p5-72b-instruct"
          # --- MiMo note ---
          # MiMo V2.5-Pro and MiMo V2.5 are NOT on Fireworks — Xiaomi API + OpenRouter only.
          # Use OpenRouter endpoint for xiaomi/mimo-v2.5-pro and xiaomi/mimo-v2.5 instead.
          # --- Meta ---
          - "accounts/fireworks/models/llama-v3p3-70b-instruct"
      titleConvo: true
      titleModel: "current_model"
      # tool_choice added — Fireworks/Kimi throws UnsupportedParamsError without this
      dropParams: ["stop", "user", "frequency_penalty", "presence_penalty", "tool_choice"]

    - name: "DeepSeek"
      apiKey: "${DEEPSEEK_API_KEY}"
      baseURL: "https://api.deepseek.com"
      models:
        fetch: false
        default:
          - "deepseek-v4-flash"   # 284B MoE, 13B active, 1M ctx — bulk/high-volume default
          - "deepseek-v4-pro"     # 1.6T MoE, 49B active, 1M ctx — frontier reasoning/agentic
      titleConvo: true
      titleModel: "deepseek-v4-flash"
      modelDisplayLabel: "DeepSeek"
      # NOTE: DeepSeek direct endpoint returns 400 when tools array is malformed by LibreChat.
      # Drop all tool/function-call params to prevent deserialization errors (GH discussion #12805).
      # If you need tool use on DeepSeek direct, route through OpenRouter instead.
      dropParams: ["stop", "user", "frequency_penalty", "presence_penalty", "tool_choice", "tools"]

    - name: "OpenRouter"
      apiKey: "${OPENROUTER_KEY}"
      baseURL: "https://openrouter.ai/api/v1"
      models:
        fetch: false
        default:
          # --- Anthropic ---
          - "anthropic/claude-sonnet-4.6"
          - "anthropic/claude-sonnet-4.5"
          - "anthropic/claude-opus-4.6"
          # --- Google ---
          - "google/gemini-3.5-flash"
          - "google/gemini-3-pro-preview"
          # NOTE: gemini-3.1-pro slug unconfirmed at time of merge;
          # check openrouter.ai/google before uncommenting:
          - "google/gemini-3.1-pro-preview"
          - "google/gemma-4-31b-it"             # Gemma 4 31B paid, 256K ctx, multimodal
          - "google/gemma-4-31b-it:free"         # Gemma 4 31B free tier
          # --- OpenAI ---
          - "openai/gpt-5.4"
          - "openai/gpt-5.4-mini"
          - "openai/gpt-5.4-nano"
          - "openai/gpt-5.4-pro"
          - "openai/gpt-5.2"
          - "openai/gpt-oss-120b"
          # --- xAI ---
          - "x-ai/grok-4.20-beta"
          - "x-ai/grok-4.20-multi-agent-beta"
          - "x-ai/grok-4.1-fast"
          # --- Xiaomi MiMo ---
          - "xiaomi/mimo-v2.5-pro"              # NEW — 1T MoE, 42B active, 1M ctx, frontier agentic coding
          - "xiaomi/mimo-v2.5"                  # NEW — omnimodal (text/image/video/audio), 1M ctx
          - "xiaomi/mimo-v2-pro"
          - "xiaomi/mimo-v2-omni"
          - "xiaomi/mimo-v2-flash"
          # --- Mistral ---
          - "mistralai/mistral-small-2603"
          # --- Qwen ---
          - "qwen/qwen3.6-plus"                 # hybrid linear+MoE, 1M ctx, 78.8 SWE-bench
          - "qwen/qwen3.5-397b-a17b"
          - "qwen/qwen3.5-plus-02-15"
          # --- Meta / Moonshot / Deepseek ---
          - "meta-llama/llama-3.3-70b-instruct"
          - "moonshotai/kimi-k2.5"
          - "moonshotai/kimi-k2.6"
          - "deepseek/deepseek-v3.2"
          - "deepseek/deepseek-v4-pro"
          - "deepseek/deepseek-v4-flash"
          - "deepseek/deepseek-v4-flash:free"   # free tier — retry loop acceptable for non-critical tasks
          - "inclusionai/ling-2.6-flash:free"
      titleConvo: true
      titleModel: "current_model"
      dropParams: ["stop", "user"]

    - name: "Tavily"
      apiKey: "${TAVILY_API_KEY}"
      baseURL: "https://api.tavily.com"
      models:
        default: ["tavily_search"]
      isCompanion: true
