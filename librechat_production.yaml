version: "1.3.5"
cache: true

# --- INTERFACE ---
interface:
  agents:
    use: true
    create: true
    share: false
    public: false
  prompts:
    use: true
    create: true
    share: false
    public: false
  tools: true
  artifacts: true
  modelSelect: true
  sidePanel: true
  bookmarks: true
  multiConvo: true
  fileCitations: true
  marketplace:
    use: false

# --- SECURITY ---
actions:
  allowedDomains:
    - "api.tavily.com"
    - "api.fireworks.ai"
    - "openrouter.ai"

# --- MODEL SPECS ---
modelSpecs:
  enforce: false
  prioritize: true
  list:
    - name: "sonnet-4.5-agent"
      label: "Claude 4.5 Sonnet (Agentic Workhorse)"
      endpoint: "OpenRouter"
      model: "anthropic/claude-sonnet-4.5"
      preset:
        endpoint: "OpenRouter"
        model: "anthropic/claude-sonnet-4.5"
        tools: ["tavily_search"]
    - name: "gemini-3-flash-agent"
      label: "Gemini 3 Flash (1M Token Agent)"
      endpoint: "OpenRouter"
      model: "google/gemini-3-flash-preview"
      preset:
        endpoint: "OpenRouter"
        model: "google/gemini-3-flash-preview"
        tools: ["tavily_search"]
    - name: "kimi-k2.5-fast"
      label: "Kimi K2.5 (High-Speed Agent)"
      endpoint: "Fireworks"
      model: "accounts/fireworks/models/kimi-k2p5"
      preset:
        endpoint: "Fireworks"
        model: "accounts/fireworks/models/kimi-k2p5"
        tools: ["tavily_search"]

# --- FILE CONFIG ---
fileConfig:
  endpoints:
    default:
      fileSizeLimit: 25      # 25 MB per file (was wrong byte value before)
      supportedMimeTypes:
        - "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
        - "application/pdf"
        - "text/.*"

# --- REGISTRATION ---
registration:
  socialLogins: ["discord", "github", "google"]
  # Note: ALLOW_REGISTRATION=false goes in Railway env vars, not here

# --- ENDPOINTS ---
endpoints:
  custom:
    - name: "Fireworks"
      apiKey: "${FIREWORKS_API_KEY}"
      baseURL: "https://api.fireworks.ai/inference/v1"
      models:
        fetch: false
        default:
          - "accounts/fireworks/models/kimi-k2p5"
          - "accounts/fireworks/models/llama-v3p3-70b-instruct"
          - "accounts/fireworks/models/qwen2p5-72b-instruct"
      titleConvo: true
      titleModel: "current_model"
      dropParams: ["stop", "user"]

    - name: "OpenRouter"
      apiKey: "${OPENROUTER_KEY}"
      baseURL: "https://openrouter.ai/api/v1"
      models:
        fetch: false
        default:
          - "anthropic/claude-sonnet-4.5"
          - "anthropic/claude-opus-4.6"
          - "google/gemini-3-flash-preview"
          - "google/gemini-3-pro-preview"
          - "openai/gpt-5.2"
          - "qwen/qwen3.5-397b-a17b"
          - "qwen/qwen3.5-plus-02-15"
          - "openai/gpt-oss-120b"
          - "meta-llama/llama-3.3-70b-instruct"
          - "moonshotai/kimi-k2.5"
          - "x-ai/grok-4.1-fast"
      titleConvo: true
      titleModel: "current_model"
      dropParams: ["stop", "user"]

    - name: "Tavily"
      apiKey: "${TAVILY_API_KEY}"
      baseURL: "https://api.tavily.com"
      models:
        default: ["tavily_search"]
      isCompanion: true
