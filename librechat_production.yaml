# librechat_production.yaml
# v1.3.6 — merged upstream + custom Railway config

version: "1.3.6"
cache: true

# --- INTERFACE ---
interface:
  # New in 1.3.6
  fileSearch: true
  endpointsMenu: true
  modelSelect: true
  parameters: true
  sidePanel: true
  presets: true
  bookmarks: true
  multiConvo: true
  fileCitations: true
  peoplePicker:
    users: true
    groups: true
    roles: true
  agents:
    use: true
    create: true
    share: false
    public: false
  prompts:
    use: true
    create: true
    share: false
    public: false
  marketplace:
    use: false
  # MCP server permissions — uncomment to enable
  # mcpServers:
  #   use: true
  #   create: false
  #   share: false
  #   public: false

# --- SECURITY ---
actions:
  allowedDomains:
    - "api.tavily.com"
    - "api.fireworks.ai"
    - "openrouter.ai"

# MCP transport domain allowlist — uncomment if adding remote MCP servers
# mcpSettings:
#   allowedDomains:
#     - "host.docker.internal"

# --- REGISTRATION ---
registration:
  socialLogins: ["discord", "github", "google"]
  # Note: ALLOW_REGISTRATION=false goes in Railway env vars, not here

# --- MODEL SPECS ---
modelSpecs:
  enforce: false
  prioritize: true
  list:
    - name: "sonnet-4.5-agent"
      label: "Claude 4.5 Sonnet (Agentic Workhorse)"
      endpoint: "OpenRouter"
      model: "anthropic/claude-sonnet-4.5"
      preset:
        endpoint: "OpenRouter"
        model: "anthropic/claude-sonnet-4.5"
        tools: ["tavily_search"]
    - name: "gemini-3-flash-agent"
      label: "Gemini 3 Flash (1M Token Agent)"
      endpoint: "OpenRouter"
      model: "google/gemini-3-flash-preview"
      preset:
        endpoint: "OpenRouter"
        model: "google/gemini-3-flash-preview"
        tools: ["tavily_search"]
    - name: "kimi-k2.5-fast"
      label: "Kimi K2.5 (High-Speed Agent)"
      endpoint: "Fireworks"
      model: "accounts/fireworks/models/kimi-k2p5"
      preset:
        endpoint: "Fireworks"
        model: "accounts/fireworks/models/kimi-k2p5"
        tools: ["tavily_search"]

# --- FILE CONFIG ---
fileConfig:
  endpoints:
    default:
      fileSizeLimit: 25
      supportedMimeTypes:
        - "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
        - "application/pdf"
        - "text/.*"

# --- ENDPOINTS ---
endpoints:
  custom:
    - name: "Fireworks"
      apiKey: "${FIREWORKS_API_KEY}"
      baseURL: "https://api.fireworks.ai/inference/v1"
      models:
        fetch: false
        default:
          - "accounts/fireworks/models/kimi-k2p5"
          - "accounts/fireworks/models/llama-v3p3-70b-instruct"
          - "accounts/fireworks/models/qwen2p5-72b-instruct"
      titleConvo: true
      titleModel: "current_model"
      dropParams: ["stop", "user"]

    - name: "OpenRouter"
      apiKey: "${OPENROUTER_KEY}"
      baseURL: "https://openrouter.ai/api/v1"
      models:
        fetch: false
        default:
          # --- Anthropic ---
          - "anthropic/claude-sonnet-4.6"
          - "anthropic/claude-sonnet-4.5"
          - "anthropic/claude-opus-4.6"
          # --- Google ---
          - "google/gemini-3-flash-preview"
          - "google/gemini-3-pro-preview"
          # NOTE: gemini-3.1-pro slug unconfirmed at time of merge;
          # check openrouter.ai/google before uncommenting:
          - "google/gemini-3.1-pro-preview"
          - "google/gemma-4-31b-it"             # new — Gemma 4 31B paid, 256K ctx, multimodal
          - "google/gemma-4-31b-it:free"         # new — Gemma 4 31B free tier
          # --- OpenAI ---
          - "openai/gpt-5.4"
          - "openai/gpt-5.4-mini"
          - "openai/gpt-5.4-nano"
          - "openai/gpt-5.4-pro"
          - "openai/gpt-5.2"
          - "openai/gpt-oss-120b"
          # --- xAI ---
          - "x-ai/grok-4.20-beta"
          - "x-ai/grok-4.20-multi-agent-beta"
          - "x-ai/grok-4.1-fast"
          # --- Xiaomi MiMo ---
          - "xiaomi/mimo-v2.5-pro"
          - "xiaomi/mimo-v2.5"
          - "xiaomi/mimo-v2-pro"
          - "xiaomi/mimo-v2-omni"
          - "xiaomi/mimo-v2-flash"              # new — 309B MoE, 256K ctx, #1 OSS SWE-bench
          # --- Mistral ---
          - "mistralai/mistral-small-2603"
          # --- Qwen ---
          - "qwen/qwen3.6-plus"                 # new — hybrid linear+MoE, 1M ctx, 78.8 SWE-bench
          - "qwen/qwen3.5-397b-a17b"
          - "qwen/qwen3.5-plus-02-15"
          # --- Meta / Moonshot / Deepseek ---
          - "meta-llama/llama-3.3-70b-instruct"
          - "moonshotai/kimi-k2.5"
          - "moonshotai/kimi-k2.6"
          - "deepseek/deepseek-v3.2"
          - "inclusionai/ling-2.6-flash:free"
      titleConvo: true
      titleModel: "current_model"
      dropParams: ["stop", "user"]

    - name: "Tavily"
      apiKey: "${TAVILY_API_KEY}"
      baseURL: "https://api.tavily.com"
      models:
        default: ["tavily_search"]
      isCompanion: true
