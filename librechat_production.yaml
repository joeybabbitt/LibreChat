# librechat_production.yaml
# v1.3.11 — merged upstream (LibreChat v0.8.5) + custom Railway config
# Bumped from 1.3.6 -> 1.3.11. See change notes inline (marked: ### 1.3.x).

version: "1.3.11"
cache: true

# --- INTERFACE ---
interface:
  fileSearch: true
  # ### 1.3.8: `endpointsMenu` and `sidePanel` REMOVED from schema (now no-op,
  #            controlled by the redesigned sidebar UI). Lines deleted to avoid
  #            validation noise — they no longer do anything.
  modelSelect: true
  parameters: true
  presets: true
  bookmarks: true
  multiConvo: true
  fileCitations: true
  peoplePicker:
    users: true
    groups: true
    roles: true
  agents:
    use: true
    create: true
    share: false
    public: false
  prompts:
    use: true
    create: true
    share: false
    public: false
  marketplace:
    use: false
  # MCP server permissions — uncomment to enable UI-managed MCP servers
  # mcpServers:
  #   use: true
  #   create: false
  #   share: false
  #   public: false

# --- SECURITY ---
actions:
  allowedDomains:
    - "api.tavily.com"
    - "api.fireworks.ai"
    - "openrouter.ai"
    - "api.deepseek.com"          # added for DeepSeek direct endpoint

# MCP transport domain allowlist — uncomment if adding remote MCP servers
# mcpSettings:
#   allowedDomains:
#     - "host.docker.internal"

# --- REGISTRATION ---
registration:
  socialLogins: ["discord", "github", "google"]
  # Note: ALLOW_REGISTRATION=false goes in Railway env vars, not here

# --- WEB SEARCH ---
webSearch:
  searchProvider: "serper"
  serperApiKey: "${SERPER_API_KEY}"
  scraperProvider: "serper"
  rerankerType: "jina"
  jinaApiKey: "${JINA_API_KEY}"
  scraperTimeout: 30000    # bumped from default 7500ms — Serper scraper can be slow on heavy pages
                           # ### 1.3.8: schema now requires non-negative integer — 30000 is valid.
  safeSearch: 0            # 0 = OFF, 1 = MODERATE (default), 2 = STRICT

# --- SUMMARIZATION (NEW: top-level, ### 1.3.8) ---
# Centralized replacement for the old per-endpoint summarize/summaryModel fields.
# Compresses older messages into a checkpoint summary when a conversation nears
# the context window, and prunes oversized tool results before that point.
# Routes summary generation through your OpenRouter custom endpoint on a cheap model.
# To disable entirely, delete this whole block.
summarization:
  provider: "OpenRouter"          # references the custom endpoint name below (### 1.3.9 custom-endpoint providers supported)
  model: "google/gemini-3.5-flash"  # cheap, fast, 1M ctx — good summarizer
  maxSummaryTokens: 4096
  reserveRatio: 0.05
  trigger:
    type: "token_ratio"           # summarize when context fills past `value`
    value: 0.8
  contextPruning:
    enabled: true                 # trims huge old tool results (great for GitHub/Filesystem MCP dumps)
    keepLastAssistants: 3
    softTrimRatio: 0.3
    hardClearRatio: 0.5
    minPrunableToolChars: 50000
    softTrim:
      maxChars: 4000
      headChars: 1500
      tailChars: 1500
    hardClear:
      enabled: true
      placeholder: "[Old tool result content cleared]"

# --- MODEL SPECS ---
modelSpecs:
  enforce: false
  prioritize: true
  list:
    - name: "sonnet-4.6-agent"
      label: "Claude 4.6 Sonnet (Agentic Workhorse)"   # ### bumped 4.5 -> 4.6 (current best Sonnet, same price)
      endpoint: "OpenRouter"
      model: "anthropic/claude-sonnet-4.6"
      preset:
        endpoint: "OpenRouter"
        model: "anthropic/claude-sonnet-4.6"
        tools: ["tavily_search"]
    - name: "gemini-3.5-flash-agent"
      label: "Gemini 3.5 Flash (1M Token Agent)"        # ### slug fix: gemini-3-flash-preview was retired -> gemini-3.5-flash
      endpoint: "OpenRouter"
      model: "google/gemini-3.5-flash"
      preset:
        endpoint: "OpenRouter"
        model: "google/gemini-3.5-flash"
        tools: ["tavily_search"]
    - name: "kimi-k2.5-fast"
      label: "Kimi K2.5 (High-Speed Agent)"             # left on k2.5 intentionally — cheaper/faster than k2.6
      endpoint: "Fireworks"
      model: "accounts/fireworks/models/kimi-k2p5"
      preset:
        endpoint: "Fireworks"
        model: "accounts/fireworks/models/kimi-k2p5"
        tools: ["tavily_search"]

# --- FILE CONFIG ---
fileConfig:
  endpoints:
    default:
      fileSizeLimit: 25
      supportedMimeTypes:
        - "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
        - "application/pdf"
        - "text/.*"

# --- ENDPOINTS ---
endpoints:
  # Shared settings applied across ALL endpoints (### 1.3.8). `all` does NOT accept baseURL.
  all:
    maxToolResultChars: 50000   # hard cap on tool-call output sent to the model — protects context/token spend on large MCP results

  custom:
    - name: "Fireworks"
      apiKey: "${FIREWORKS_API_KEY}"
      baseURL: "https://api.fireworks.ai/inference/v1"
      models:
        fetch: false
        default:
          # --- Kimi (Moonshot) ---
          - "accounts/fireworks/models/kimi-k2p6"           # Kimi K2.6, 1T MoE, Tier A coding, 256K ctx
          - "accounts/fireworks/models/kimi-k2p5"           # Kimi K2.5, still solid & cheaper
          # --- DeepSeek ---
          - "accounts/fireworks/models/deepseek-v4-pro"     # 1.6T MoE, 1M ctx
          # NOTE: deepseek-v4-flash availability on Fireworks still unverified — confirm at fireworks.ai/models:
          # - "accounts/fireworks/models/deepseek-v4-flash"
          - "accounts/fireworks/models/deepseek-v3p2"       # keep as fallback (cheaper, stable)
          # --- Qwen ---
          - "accounts/fireworks/models/qwen3p6-plus"        # Qwen3.6 Plus — verify exact Fireworks slug
          - "accounts/fireworks/models/qwen2p5-72b-instruct"
          # --- MiMo note ---
          # MiMo V2.5-Pro and MiMo V2.5 are NOT on Fireworks — Xiaomi API + OpenRouter only.
          # Use OpenRouter endpoint for xiaomi/mimo-v2.5-pro and xiaomi/mimo-v2.5 instead.
          # --- Meta ---
          - "accounts/fireworks/models/llama-v3p3-70b-instruct"
      titleConvo: true
      titleModel: "current_model"
      # tool_choice added — Fireworks/Kimi throws UnsupportedParamsError without this
      dropParams: ["stop", "user", "frequency_penalty", "presence_penalty", "tool_choice"]

    - name: "DeepSeek"
      apiKey: "${DEEPSEEK_API_KEY}"
      baseURL: "https://api.deepseek.com"
      models:
        fetch: false
        default:
          - "deepseek-v4-flash"   # 284B MoE, 13B active, 1M ctx — bulk/high-volume default
          - "deepseek-v4-pro"     # 1.6T MoE, 49B active, 1M ctx — frontier reasoning/agentic
      titleConvo: true
      titleModel: "deepseek-v4-flash"
      modelDisplayLabel: "DeepSeek"
      # NOTE: DeepSeek direct endpoint returns 400 when tools array is malformed by LibreChat.
      # Drop all tool/function-call params to prevent deserialization errors (GH discussion #12805).
      # If you need tool use on DeepSeek direct, route through OpenRouter instead.
      dropParams: ["stop", "user", "frequency_penalty", "presence_penalty", "tool_choice", "tools"]

    - name: "OpenRouter"
      apiKey: "${OPENROUTER_KEY}"
      baseURL: "https://openrouter.ai/api/v1"
      models:
        fetch: false
        default:
          # --- Anthropic ---
          - "anthropic/claude-opus-4.8"          # NEW — current flagship Opus (1M ctx, 128K out), most capable GA model
          - "anthropic/claude-opus-4.7"          # NEW — prior flagship, still strong
          - "anthropic/claude-opus-4.6"
          - "anthropic/claude-sonnet-4.6"
          - "anthropic/claude-sonnet-4.5"
          # --- Google ---
          - "google/gemini-3.5-flash"            # current high-efficiency multimodal flash, 1M ctx
          - "google/gemini-3.1-pro-preview"      # confirmed live (latest Gemini Pro), 1.05M ctx
          - "google/gemma-4-31b-it"              # NOTE: verify exact Gemma 4 size slug on openrouter.ai/google — 31B variant unconfirmed
          - "google/gemma-4-31b-it:free"         # (same — verify the free-tier slug)
          # --- OpenAI ---
          - "openai/gpt-5.5"                     # NEW — current frontier model (1M ctx); pricier but more token-efficient than 5.4
          - "openai/gpt-5.4"
          - "openai/gpt-5.4-mini"
          - "openai/gpt-5.4-nano"
          - "openai/gpt-5.4-pro"
          - "openai/gpt-oss-120b"
          # --- Xiaomi MiMo ---
          - "xiaomi/mimo-v2.5-pro"               # 1T MoE, 42B active, 1M ctx, frontier agentic coding
          - "xiaomi/mimo-v2.5"                    # omnimodal (text/image/video/audio), 1M ctx
          # --- Qwen ---
          - "qwen/qwen3.7-max"                   # flagship Qwen3.7 series, 1M ctx, agent-centric
          - "qwen/qwen3.6-plus"                  # hybrid linear+MoE, 1M ctx
          - "qwen/qwen3.6-plus:free"             # NEW — free tier of qwen3.6-plus
          # --- Meta / Moonshot / Deepseek ---
          - "meta-llama/llama-3.3-70b-instruct"
          - "moonshotai/kimi-k2.5"
          - "moonshotai/kimi-k2.6"
          - "deepseek/deepseek-v4-pro"
          - "deepseek/deepseek-v4-flash"
          - "deepseek/deepseek-v4-flash:free"    # free tier — retry loop acceptable for non-critical tasks
          - "inclusionai/ling-2.6-flash:free"
      titleConvo: true
      titleModel: "current_model"
      dropParams: ["stop", "user"]

    - name: "Tavily"
      apiKey: "${TAVILY_API_KEY}"
      baseURL: "https://api.tavily.com"
      models:
        default: ["tavily_search"]
      isCompanion: true
