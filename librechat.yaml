version: 1.2.8
cache: true

# ==========================================
# INTERFACE CUSTOMIZATION
# ==========================================
interface:
  title: "My LibreChat"
  endpointsMenu: true
  
  # Enable artifacts for code, documents, visualizations
  artifacts:
    enabled: true
    maxSize: 10000000  # 10MB max artifact size
  
  privacyPolicy:
    externalUrl: "https://librechat.ai/privacy-policy"
    openNewTab: true
  
  termsOfService:
    externalUrl: "https://librechat.ai/tos"
    openNewTab: true

# ==========================================
# REGISTRATION & ACCESS
# ==========================================
registration:
  socialLogins: ["google", "github", "discord"]

# ==========================================
# RATE LIMITING
# ==========================================
rateLimits:
  fileUploads:
    ipMax: 100
    ipWindowInMinutes: 60
    userMax: 50
    userWindowInMinutes: 60
  conversationRateLimit:
    enabled: true
    max: 120
    windowInMinutes: 60

# ==========================================
# FILE UPLOAD CONFIGURATION
# ==========================================
fileConfig:
  serverFileSizeLimit: 100
  avatarSizeLimit: 2
  
  endpoints:
    openRouter:
      disabled: false
      fileLimit: 10
      fileSizeLimit: 20
      totalSizeLimit: 50
      supportedMimeTypes:
        - "image/*"
        - "application/pdf"
        - "text/*"
        - "application/json"
        - "application/xml"
        - "application/zip"
    
    default:
      disabled: false
      fileLimit: 5
      fileSizeLimit: 10
      totalSizeLimit: 25
      supportedMimeTypes:
        - "image/*"
        - "application/pdf"
        - "text/*"

# ==========================================
# MCP SERVERS (Extended Claude Capabilities)
# ==========================================
mcpServers:
  Time:
    type: "stdio"
    command: "uvx"
    args: ["mcp-server-time"]
    startup: false
  
  Filesystem:
    type: "stdio"
    command: "uvx"
    args: ["mcp-server-filesystem", "/app"]
    startup: false
  
  GitHub:
    type: "stdio"
    command: "uvx"
    args: ["mcp-server-github"]
    env:
      GITHUB_TOKEN: "${GITHUB_TOKEN}"
    startup: false

# ==========================================
# AI ENDPOINTS
# ==========================================
endpoints:
  custom:
    - name: "OpenRouter"
      apiKey: "${OPENROUTER_KEY}"
      baseURL: "https://openrouter.ai/api/v1"
      models:
        default: [
          "anthropic/claude-sonnet-4.5",
          "anthropic/claude-opus-4",
          "anthropic/claude-3-7-sonnet-20250219",
          "openai/gpt-4o",
          "openai/o1",
          "openai/o1-mini",
          "deepseek-ai/deepseek-r1",
          "deepseek-ai/deepseek-v3",
          "google/gemini-2.0-flash-exp",
          "google/gemini-2.0-pro-exp",
          "meta-llama/llama-3.3-70b-instruct",
          "qwen/qwen-2.5-72b-instruct",
          "perplexity/sonar-pro",
          "x-ai/grok-3"
        ]
        fetch: true
      titleConvo: true
      titleModel: "anthropic/claude-sonnet-4.5"
      dropParams: ["stop"]
      modelDisplayLabel: "OpenRouter"
      addParams:
        anthropic-version: "2023-06-01"
      headers:
        anthropic-beta: "prompt-caching-2024-07-31"
      forcePrompt: false

# ==========================================
# MODEL PRESETS
# ==========================================
modelSpecs:
  preset:
    - preset_id: "coding-assistant"
      title: "💻 Coding Assistant"
      endpoint: "openRouter"
      model: "anthropic/claude-sonnet-4.5"
      modelLabel: "Claude Sonnet 4.5"
      promptPrefix: |
        You are an expert software engineer and coding assistant.
        Provide clean, well-commented code with explanations.
        Follow best practices and modern coding standards.
      temperature: 0.2
      top_p: 0.95
      max_tokens: 8000
      presence_penalty: 0
      frequency_penalty: 0
    
    - preset_id: "deep-reasoning"
      title: "🧠 Deep Reasoning"
      endpoint: "openRouter"
      model: "deepseek-ai/deepseek-r1"
      modelLabel: "DeepSeek R1"
      promptPrefix: |
        Think step-by-step through complex problems.
        Show your reasoning process clearly.
        Consider multiple perspectives before concluding.
      temperature: 0.3
      max_tokens: 8000
    
    - preset_id: "creative-writer"
      title: "✍️ Creative Writer"
      endpoint: "openRouter"
      model: "anthropic/claude-sonnet-4.5"
      modelLabel: "Claude Sonnet 4.5"
      promptPrefix: |
        You are a creative and eloquent writer.
        Craft engaging, vivid, and original content.
        Use rich vocabulary and varied sentence structure.
      temperature: 0.9
      top_p: 0.95
      max_tokens: 8000
    
    - preset_id: "researcher"
      title: "🔍 Research Assistant"
      endpoint: "openRouter"
      model: "perplexity/sonar-pro"
      modelLabel: "Perplexity Sonar Pro"
      promptPrefix: |
        You are a thorough research assistant.
        Provide well-researched, cited information.
        Consider multiple sources and perspectives.
      temperature: 0.5
      max_tokens: 8000
    
    - preset_id: "novel-writer"
      title: "📚 Novel Writer"
      endpoint: "openRouter"
      model: "anthropic/claude-opus-4"
      modelLabel: "Claude Opus 4"
      promptPrefix: |
        You are a skilled novelist and storyteller.
        Create immersive, character-driven narratives with:
        - Rich, descriptive prose
        - Well-developed characters with distinct voices
        - Engaging plot progression
        - Vivid world-building
        - Natural dialogue
        
        For long-form works, maintain consistency across chapters.
        Use artifacts to present completed sections.
      temperature: 0.85
      top_p: 0.95
      max_tokens: 16000
      presence_penalty: 0.1
      frequency_penalty: 0.1

# ==========================================
# ADDITIONAL FEATURES
# ==========================================
memory:
  enabled: true

moderation:
  enabled: false

balance:
  enabled: true
