version: 1.2.8
cache: true

# ==========================================
# INTERFACE CUSTOMIZATION
# ==========================================
interface:
  title: "My LibreChat"
  endpointsMenu: true
  
  # Enable artifacts for code, documents, visualizations
  artifacts:
    enabled: true
    maxSize: 10000000  # 10MB max artifact size
  
  privacyPolicy:
    externalUrl: "https://librechat.ai/privacy-policy"
    openNewTab: true
  
  termsOfService:
    externalUrl: "https://librechat.ai/tos"
    openNewTab: true

# ==========================================
# REGISTRATION & ACCESS
# ==========================================
registration:
  socialLogins: ["google", "github", "discord"]
  # For personal use, you can leave this open or restrict to your email
  # allowedDomains:
  #   - "youremail.com"

# ==========================================
# RATE LIMITING
# ==========================================
rateLimits:
  fileUploads:
    ipMax: 100
    ipWindowInMinutes: 60
    userMax: 50
    userWindowInMinutes: 60
  conversationRateLimit:
    enabled: true
    max: 120  # messages per hour (generous for personal use)
    windowInMinutes: 60

# ==========================================
# FILE UPLOAD CONFIGURATION
# ==========================================
fileConfig:
  # Global settings
  serverFileSizeLimit: 100  # MB - max file size server will accept
  avatarSizeLimit: 2  # MB - profile picture size
  
  endpoints:
    # OpenRouter file handling
    openRouter:
      disabled: false
      fileLimit: 10  # max files per message
      fileSizeLimit: 20  # MB per file
      totalSizeLimit: 50  # MB total per request
      supportedMimeTypes:
        - "image/*"
        - "application/pdf"
        - "text/*"
        - "application/json"
        - "application/xml"
        - "application/zip"
    
    # Default for all other endpoints
    default:
      disabled: false
      fileLimit: 5
      fileSizeLimit: 10
      totalSizeLimit: 25
      supportedMimeTypes:
        - "image/*"
        - "application/pdf"
        - "text/*"

# ==========================================
# MCP SERVERS (Extended Claude Capabilities)
# ==========================================
mcpServers:
  # Time and date information
  Time:
    type: "stdio"
    command: "uvx"
    args: ["mcp-server-time"]
    startup: false
  
  # File system access (safe scoped access)
  Filesystem:
    type: "stdio"
    command: "uvx"
    args: ["mcp-server-filesystem", "/app"]
    startup: false
  
  # GitHub integration
  GitHub:
    type: "stdio"
    command: "uvx"
    args: ["mcp-server-github"]
    env:
      GITHUB_TOKEN: "${GITHUB_TOKEN}"
    startup: false
  
   Memory/note-taking (optional - uncomment if desired)
   Memory:
     type: "stdio"
     command: "uvx"
     args: ["mcp-server-memory"]
     startup: false
  
  # Web search via Brave (optional - requires BRAVE_API_KEY)
  # Brave:
  #   type: "stdio"
  #   command: "uvx"
  #   args: ["mcp-server-brave-search"]
  #   env:
  #     BRAVE_API_KEY: "${BRAVE_API_KEY}"
  #   startup: false

# ==========================================
# AI ENDPOINTS
# ==========================================
endpoints:
  custom:
    - name: "OpenRouter"
      apiKey: "${OPENROUTER_KEY}"
      baseURL: "https://openrouter.ai/api/v1"
      
      # Curated model list for best experience
      models:
        default: [
          # === Claude (Anthropic) - Best for complex tasks ===
          "anthropic/claude-sonnet-4.5",
          "anthropic/claude-opus-4",
          "anthropic/claude-3-7-sonnet-20250219",
          
          # === OpenAI - Best for general purpose ===
          "openai/gpt-4o",
          "openai/o1",
          "openai/o1-mini",
          
          # === DeepSeek - Best for reasoning & code ===
          "deepseek-ai/deepseek-r1",
          "deepseek-ai/deepseek-v3",
          
          # === Google - Fast and multimodal ===
          "google/gemini-2.0-flash-exp",
          "google/gemini-2.0-pro-exp",
          
          # === Meta (Llama) - Open source powerhouse ===
          "meta-llama/llama-3.3-70b-instruct",
          
          # === Qwen - Strong general purpose ===
          "qwen/qwen-2.5-72b-instruct",
          
          # === Specialized Models ===
          "perplexity/sonar-pro",  # Research & search
          "x-ai/grok-3"  # xAI's latest
        ]
        
        # Fetch all available models from OpenRouter
        fetch: true
      
      # Use Claude for conversation titles
      titleConvo: true
      titleModel: "anthropic/claude-sonnet-4.5"
      
      # OpenRouter-specific: drop stop tokens (varies by model)
      dropParams: ["stop"]
      
      # Display name in UI
      modelDisplayLabel: "OpenRouter"
      
      # Enable Claude prompt caching for cost savings
      addParams:
        anthropic-version: "2023-06-01"
      
      # Enable Claude caching beta
      headers:
        anthropic-beta: "prompt-caching-2024-07-31"
      
      # Optional: Add custom icon
      # iconURL: "https://yourdomain.com/openrouter-icon.png"
      
      # Force prompt for API key (false = use environment variable)
      forcePrompt: false

# ==========================================
# MODEL PRESETS (Optional - Quick Start Configs)
# ==========================================
modelSpecs:
  preset:
    - preset_id: "coding-assistant"
      title: "💻 Coding Assistant"
      endpoint: "openRouter"
      model: "anthropic/claude-sonnet-4.5"
      modelLabel: "Claude Sonnet 4.5"
      promptPrefix: |
        You are an expert software engineer and coding assistant.
        Provide clean, well-commented code with explanations.
        Follow best practices and modern coding standards.
      temperature: 0.2
      top_p: 0.95
      max_tokens: 8000
      presence_penalty: 0
      frequency_penalty: 0
    
    - preset_id: "deep-reasoning"
      title: "🧠 Deep Reasoning"
      endpoint: "openRouter"
      model: "deepseek-ai/deepseek-r1"
      modelLabel: "DeepSeek R1"
      promptPrefix: |
        Think step-by-step through complex problems.
        Show your reasoning process clearly.
        Consider multiple perspectives before concluding.
      temperature: 0.3
      max_tokens: 8000
    
    - preset_id: "creative-writer"
      title: "✍️ Creative Writer"
      endpoint: "openRouter"
      model: "anthropic/claude-sonnet-4.5"
      modelLabel: "Claude Sonnet 4.5"
      promptPrefix: |
        You are a creative and eloquent writer.
        Craft engaging, vivid, and original content.
        Use rich vocabulary and varied sentence structure.
      temperature: 0.9
      top_p: 0.95
      max_tokens: 8000
    
    - preset_id: "researcher"
      title: "🔍 Research Assistant"
      endpoint: "openRouter"
      model: "perplexity/sonar-pro"
      modelLabel: "Perplexity Sonar Pro"
      promptPrefix: |
        You are a thorough research assistant.
        Provide well-researched, cited information.
        Consider multiple sources and perspectives.
      temperature: 0.5
      max_tokens: 8000

# ==========================================
# ADDITIONAL FEATURES
# ==========================================

# Memory settings (stores conversation context)
memory:
  enabled: true

# Moderation settings (content filtering)
moderation:
  enabled: false  # Set to true if you want content filtering

# Balance tracking (for managing API costs)
balance:
  enabled: true  # Enable if you want to track usage costs
