version: 1.2.8
cache: true

interface:
  title: "My LibreChat"
  endpointsMenu: true
  artifacts:
    enabled: true
    maxSize: 10000000
  privacyPolicy:
    externalUrl: "https://librechat.ai/privacy-policy"
    openNewTab: true
  termsOfService:
    externalUrl: "https://librechat.ai/tos"
    openNewTab: true

registration:
  socialLogins: ["google", "github", "discord"]

rateLimits:
  fileUploads:
    ipMax: 100
    ipWindowInMinutes: 60
    userMax: 50
    userWindowInMinutes: 60
  conversationRateLimit:
    enabled: true
    max: 120
    windowInMinutes: 60

fileConfig:
  serverFileSizeLimit: 100
  avatarSizeLimit: 2
  endpoints:
    OpenRouter:
      disabled: false
      fileLimit: 10
      fileSizeLimit: 20
      totalSizeLimit: 50
      supportedMimeTypes:
        - "image/*"
        - "application/pdf"
        - "text/*"
        - "application/json"
        - "application/xml"
        - "application/zip"
    default:
      disabled: false
      fileLimit: 5
      fileSizeLimit: 10
      totalSizeLimit: 25
      supportedMimeTypes:
        - "image/*"
        - "application/pdf"
        - "text/*"

mcpServers:
  Time:
    type: "stdio"
    command: "uvx"
    args: ["mcp-server-time"]
    startup: false
  Filesystem:
    type: "stdio"
    command: "uvx"
    args: ["mcp-server-filesystem", "/app"]
    startup: false
  GitHub:
    type: "stdio"
    command: "uvx"
    args: ["mcp-server-github"]
    env:
      GITHUB_TOKEN: "${GITHUB_TOKEN}"
    startup: false

endpoints:
  custom:
    - name: "OpenRouter"
      apiKey: "${OPENROUTER_KEY}"
      baseURL: "https://openrouter.ai/api/v1"
      models:
        default:
          - "anthropic/claude-sonnet-4.5"
          - "anthropic/claude-opus-4"
          - "openai/gpt-4o"
          - "deepseek-ai/deepseek-r1"
          - "google/gemini-2.0-flash-exp"
          - "meta-llama/llama-3.3-70b-instruct"
        fetch: true
      titleConvo: true
      titleModel: "anthropic/claude-sonnet-4.5"
      dropParams: ["stop"]
      modelDisplayLabel: "OpenRouter"
      addParams:
        anthropic-version: "2023-06-01"
      headers:
        anthropic-beta: "prompt-caching-2024-07-31"
      forcePrompt: false

modelSpecs:
  list:
    - name: "coding-assistant"
      label: "💻 Coding Assistant"
      preset:
        endpoint: "OpenRouter"
        model: "anthropic/claude-sonnet-4.5"
        modelLabel: "Claude Sonnet 4.5"
        promptPrefix: |
          You are an expert software engineer and coding assistant.
          Provide clean, well-commented code with explanations.
          Follow best practices and modern coding standards.
        temperature: 0.2
        top_p: 0.95
        max_tokens: 8000
        presence_penalty: 0
        frequency_penalty: 0
    
    - name: "deep-reasoning"
      label: "🧠 Deep Reasoning"
      preset:
        endpoint: "OpenRouter"
        model: "deepseek-ai/deepseek-r1"
        modelLabel: "DeepSeek R1"
        promptPrefix: |
          Think step-by-step through complex problems.
          Show your reasoning process clearly.
          Consider multiple perspectives before concluding.
        temperature: 0.3
        max_tokens: 8000
    
    - name: "creative-writer"
      label: "✍️ Creative Writer"
      preset:
        endpoint: "OpenRouter"
        model: "anthropic/claude-sonnet-4.5"
        modelLabel: "Claude Sonnet 4.5"
        promptPrefix: |
          You are a creative and eloquent writer.
          Craft engaging, vivid, and original content.
          Use rich vocabulary and varied sentence structure.
        temperature: 0.9
        top_p: 0.95
        max_tokens: 8000
    
    - name: "novel-writer"
      label: "📚 Novel Writer"
      preset:
        endpoint: "OpenRouter"
        model: "anthropic/claude-opus-4"
        modelLabel: "Claude Opus 4"
        promptPrefix: |
          You are a skilled novelist and storyteller.
          Create immersive, character-driven narratives with rich prose,
          well-developed characters, engaging plots, and natural dialogue.
          Use artifacts for completed sections.
        temperature: 0.85
        top_p: 0.95
        max_tokens: 16000
        presence_penalty: 0.1
        frequency_penalty: 0.1

memory:
  enabled: true

balance:
  enabled: true
