version: 1.2.8
cache: true

interface:
  title: "Wolfe's LibreChat"
  endpointsMenu: true
  artifacts:
    enabled: true
    maxSize: 10000000
  privacyPolicy:
    externalUrl: "https://librechat.ai/privacy-policy"
    openNewTab: true
  termsOfService:
    externalUrl: "https://librechat.ai/tos"
    openNewTab: true

registration:
  socialLogins: ["google", "github", "discord"]

rateLimits:
  fileUploads:
    ipMax: 100
    ipWindowInMinutes: 60
    userMax: 50
    userWindowInMinutes: 60
  conversationRateLimit:
    enabled: true
    max: 120
    windowInMinutes: 60

fileConfig:
  serverFileSizeLimit: 100
  avatarSizeLimit: 2
  endpoints:
    OpenRouter:
      disabled: false
      fileLimit: 10
      fileSizeLimit: 20
      totalSizeLimit: 50
      supportedMimeTypes:
        - "image/*"
        - "application/pdf"
        - "text/*"
    default:
      disabled: false
      fileLimit: 5
      fileSizeLimit: 10
      totalSizeLimit: 25
      supportedMimeTypes:
        - "image/*"
        - "application/pdf"
        - "text/*"

mcpServers:
  Time:
    type: "stdio"
    command: "uvx"
    args: ["mcp-server-time"]
    startup: false
  GitHub:
    type: "stdio"
    command: "uvx"
    args: ["mcp-server-github"]
    env:
      GITHUB_TOKEN: "${GITHUB_TOKEN}"
    startup: false

# ===================================================
# ENDPOINTS SECTION
# ===================================================
endpoints:
  # 1. Native Anthropic
  # Validated: "claude-3-7" does not exist yet. 
  # Use "claude-3-5-sonnet-latest" for the most up-to-date stable version.
  anthropic:
    apiKey: "${ANTHROPIC_API_KEY}"
    promptCaching: true
    models:
      default:
        - "claude-3-5-sonnet-latest"
        - "claude-3-5-haiku-latest"
      fetch: false
    titleModel: "claude-3-5-haiku-latest"

  # 2. Native Google
  # Validated: gemini-2.0-flash-exp is the correct current ID.
  google:
    apiKey: "${GOOGLE_KEY}"
    models:
      default:
        - "gemini-2.0-flash-exp"
        - "gemini-2.0-flash-thinking-exp-1219"
        - "gemini-1.5-pro-latest"
        - "gemini-1.5-flash-latest"
      fetch: true
    titleModel: "gemini-1.5-flash-latest"

  # 3. Native OpenAI
  openAI:
    apiKey: "${OPENAI_API_KEY}"
    models:
      default:
        - "gpt-4o"
        - "gpt-4o-mini"
        - "o1-mini"
        - "o1-preview"
      fetch: true
    titleModel: "gpt-4o-mini"

  # 4. OpenRouter
  # Validated: These IDs match current OpenRouter logs.
  custom:
    - name: "OpenRouter"
      apiKey: "${OPENROUTER_KEY}"
      baseURL: "https://openrouter.ai/api/v1"
      models:
        default:
          - "anthropic/claude-sonnet-4.5"        # The correct ID for the 4.5 model
          - "anthropic/claude-opus-4"
          - "openai/gpt-4o"
          - "deepseek-ai/deepseek-r1"
          - "google/gemini-3-flash-preview"      # Updated to "3-flash-preview" per logs
          - "meta-llama/llama-3.3-70b-instruct"
        fetch: true
      titleConvo: true
      titleModel: "anthropic/claude-sonnet-4.5"
      dropParams: ["stop"]
      modelDisplayLabel: "OpenRouter"
      forcePrompt: false

# ===================================================
# MODEL SPECS
# ===================================================
modelSpecs:
  list:
    - name: "coding-assistant"
      label: "💻 Coding Assistant"
      preset:
        endpoint: "OpenRouter"
        model: "anthropic/claude-sonnet-4.5"
        modelLabel: "Claude Sonnet 4.5"
        promptPrefix: |
          You are an expert software engineer and coding assistant.
          Provide clean, well-commented code with explanations.
          Follow best practices and modern coding standards.
        temperature: 0.2
        top_p: 0.95
        max_tokens: 8000

    - name: "deep-reasoning"
      label: "🧠 Deep Reasoning"
      preset:
        endpoint: "OpenRouter"
        model: "deepseek-ai/deepseek-r1"
        modelLabel: "DeepSeek R1"
        promptPrefix: |
          Think step-by-step through complex problems.
          Show your reasoning process clearly.
        temperature: 0.3
        max_tokens: 8000

    - name: "creative-writer"
      label: "✍️ Creative Writer"
      preset:
        endpoint: "OpenRouter"
        model: "anthropic/claude-sonnet-4.5"
        modelLabel: "Claude Sonnet 4.5"
        promptPrefix: |
          You are a creative and eloquent writer.
          Craft engaging, vivid, and original content.
        temperature: 0.9
        top_p: 0.95
        max_tokens: 8000

    - name: "novel-writer"
      label: "📚 Novel Writer"
      preset:
        endpoint: "OpenRouter"
        model: "anthropic/claude-opus-4"
        modelLabel: "Claude Opus 4"
        promptPrefix: |
          You are a skilled novelist and storyteller.
          Create immersive, character-driven narratives with rich prose.
        temperature: 0.85
        top_p: 0.95
        max_tokens: 16000
        presence_penalty: 0.1
        frequency_penalty: 0.1

memory:
  enabled: true

balance:
  enabled: true
